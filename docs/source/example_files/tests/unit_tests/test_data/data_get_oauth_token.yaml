service_a_auth_success:
  auth_tokens_responses_indirect:
    - url: https://authserver.source-a.com/oauth2/token
      method: POST
      status: 200
      json_params:
        client_id: clientIdA
        client_secret: mockClientSecretA
        grant_type: client_credentials
      json:
        access_token: mockTokenA
  client_id: clientIdA
  client_secret_responses_indirect: __data_retrieve_secret.yaml:service_a_secret_success:client_secret_responses_indirect
  expected_oauth_token: mockTokenA

service_a_auth_failure:
  auth_tokens_responses_indirect:
    - url: https://authserver.source-a.com/oauth2/token
      method: POST
      status: 403
      json_params:
        client_id: clientIdA
        client_secret: mockClientSecretA
        grant_type: client_credentials
      json: {}
  client_id: clientIdA
  client_secret_responses_indirect: __data_retrieve_secret.yaml:service_a_secret_success:client_secret_responses_indirect
  expected_oauth_token: null

